name: scheduled-export

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scheduled-export
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
      MFL_API_KEY: ${{ secrets.MFL_API_KEY }}
      MFL_USER_AGENT: ${{ secrets.MFL_USER_AGENT }}
      MFL_HOST: ${{ vars.MFL_HOST }}
      MFL_YEAR: ${{ vars.MFL_YEAR }}
      MFL_LEAGUE_ID: ${{ vars.MFL_LEAGUE_ID }}
      MFL_ANNOUNCE_MAX_AGE_HOURS: ${{ vars.MFL_ANNOUNCE_MAX_AGE_HOURS }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require repository secrets
        run: |
          set -e
          for var in DISCORD_BOT_TOKEN DISCORD_CHANNEL_ID MFL_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing Actions secret '$var'. Repo → Settings → Secrets and variables → Actions → New repository secret (name must match exactly)."
              exit 1
            fi
          done

      - name: Require repository variables
        run: |
          set -e
          for var in MFL_HOST MFL_YEAR MFL_LEAGUE_ID; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing Actions variable '$var'. Repo → Settings → Secrets and variables → Actions → Variables tab → New repository variable (same name)."
              exit 1
            fi
          done

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduled job
        run: python -m src.run_once

      - name: Upload dedupe state (Contents API)
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const filePath = "data/seen_trades.json";
            if (!fs.existsSync(filePath)) {
              core.setFailed("missing " + filePath);
              return;
            }
            const newContent = fs.readFileSync(filePath, "utf8");
            const { owner, repo } = context.repo;
            const branch = context.ref.replace("refs/heads/", "");
            const b64 = Buffer.from(newContent, "utf8").toString("base64");

            for (let attempt = 1; attempt <= 10; attempt++) {
              let remoteSha = null;
              try {
                const { data } = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: filePath,
                  ref: branch,
                });
                if (Array.isArray(data)) {
                  throw new Error("path is a directory");
                }
                remoteSha = data.sha;
                const remoteText = Buffer.from(data.content, "base64").toString("utf8");
                if (remoteText === newContent) {
                  console.log("dedupe state unchanged vs remote; skip commit");
                  return;
                }
              } catch (e) {
                if (e.status !== 404) {
                  throw e;
                }
              }

              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: filePath,
                  message: "chore: sync dedupe state",
                  content: b64,
                  branch,
                  ...(remoteSha ? { sha: remoteSha } : {}),
                });
                console.log("Committed dedupe state via API");
                return;
              } catch (e) {
                const retry = (e.status === 409 || e.status === 422) && attempt < 10;
                if (retry) {
                  console.log(`API commit conflict (${e.status}), retry ${attempt}`);
                  await new Promise((r) => setTimeout(r, 4000));
                  continue;
                }
                throw e;
              }
            }
