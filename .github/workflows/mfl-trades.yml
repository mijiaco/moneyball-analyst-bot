name: MFL trade poll

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mfl-trade-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache MFL players export
        uses: actions/cache@v4
        with:
          path: data/players_cache.json
          key: mfl-players-${{ runner.os }}-${{ hashFiles('.github/workflows/mfl-trades.yml') }}
          restore-keys: |
            mfl-players-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll and post trades
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          MFL_API_KEY: ${{ secrets.MFL_API_KEY }}
        run: python -m src.run_once

      - name: Commit seen-trades state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_trades.json
          if git diff --staged --quiet; then
            echo "No seen_trades changes"
          else
            git commit -m "chore: update seen trades dedupe state"
            git push
          fi
